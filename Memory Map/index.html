<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>📜 History Guesser</title>
  <style>
    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       style.css  —  History Guesser  —  Vintage Atlas Theme
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=Courier+Prime:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #d6cdc0;
      color: #2c241b;
      font-family: 'Inter', -apple-system, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      font-size: 15px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: 100%;
      max-width: 1280px;
      height: 100%;
      max-height: 900px;
      background: #fcf7f0;
      border-radius: 28px;
      border: 1px solid #bfae9a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(44, 36, 27, 0.25), inset 0 1px 0 rgba(255, 247, 240, 0.6);
      position: relative;
    }

    /* ─── top bar ─── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: #f4efe1;
      border-bottom: 2px solid #d4c5b0;
      flex-shrink: 0;
      gap: 8px;
      flex-wrap: wrap;
    }
    .topbar .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 600;
      color: #3a2c21;
      letter-spacing: 0.02em;
    }
    .topbar .brand .logo {
      font-size: 24px;
    }
    .topbar .brand small {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: #8a7a6a;
      letter-spacing: 0.04em;
    }
    .topbar-stats {
      display: flex;
      gap: 20px;
      align-items: center;
      font-size: 13px;
      font-weight: 500;
    }
    .topbar-stats .stat {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #5a4e42;
    }
    .topbar-stats .stat .num {
      color: #2c241b;
      font-weight: 600;
      min-width: 22px;
      font-family: 'Courier Prime', monospace;
      font-size: 15px;
    }
    .topbar-stats .stat .num.gold {
      color: #a63a28;
    }

    /* ─── main ─── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      min-height: 0;
      overflow: hidden;
      background: #fcf7f0;
    }

    /* ─── map area ─── */
    .map-wrap {
      flex: 1;
      position: relative;
      background: #fcf7f0;
      overflow: hidden;
      min-height: 0;
    }
    .map-wrap canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* ─── pin marker ─── */
    .pin-marker {
      position: absolute;
      pointer-events: none;
      z-index: 10;
      font-size: 34px;
      transform: translate(-50%, -100%);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      filter: drop-shadow(0 4px 12px rgba(166, 58, 40, 0.4));
    }
    .pin-marker.bounce {
      animation: pinBounce 0.6s ease;
    }
    @keyframes pinBounce {
      0% { transform: translate(-50%, -100%) scale(0) rotate(-20deg); }
      60% { transform: translate(-50%, -100%) scale(1.25) rotate(5deg); }
      100% { transform: translate(-50%, -100%) scale(1) rotate(0deg); }
    }

    /* ─── setup overlay ─── */
    .setup-overlay {
      position: absolute;
      inset: 0;
      background: rgba(252, 247, 240, 0.92);
      backdrop-filter: blur(6px);
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .setup-overlay.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.96);
    }
    .setup-box {
      background: #fcf7f0;
      border: 1px solid #bfae9a;
      border-radius: 24px;
      padding: 32px 36px;
      max-width: 520px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 16px 60px rgba(44, 36, 27, 0.15);
    }
    .setup-box h2 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 600;
      color: #3a2c21;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .setup-box .sub {
      color: #6a5e52;
      font-size: 14px;
      margin-bottom: 22px;
      border-bottom: 1px solid #e8ddd0;
      padding-bottom: 14px;
      font-weight: 400;
    }
    .setup-box .field {
      margin-bottom: 18px;
    }
    .setup-box .field label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6a5e52;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .setup-box .field .options {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .setup-box .field .options button {
      padding: 6px 18px;
      border-radius: 40px;
      border: 1px solid #bfae9a;
      background: transparent;
      color: #4a3c31;
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s;
      touch-action: manipulation;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
    }
    .setup-box .field .options button:hover {
      background: #f4efe1;
      border-color: #a09080;
    }
    .setup-box .field .options button.active {
      background: #3a2c21;
      border-color: #3a2c21;
      color: #fcf7f0;
    }
    .setup-box .field .options button.active:hover {
      background: #2c241b;
    }
    .setup-box .start-btn {
      width: 100%;
      padding: 13px;
      border-radius: 40px;
      border: none;
      background: #3a2c21;
      color: #fcf7f0;
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      touch-action: manipulation;
      margin-top: 4px;
      letter-spacing: 0.02em;
    }
    .setup-box .start-btn:hover {
      background: #2c241b;
      transform: scale(1.01);
      box-shadow: 0 4px 16px rgba(44, 36, 27, 0.2);
    }
    .setup-box .event-count {
      text-align: center;
      font-size: 13px;
      color: #6a5e52;
      margin-top: 12px;
      font-weight: 400;
    }

    /* ─── game overlay ─── */
    .game-overlay {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 720px;
      background: rgba(252, 247, 240, 0.95);
      backdrop-filter: blur(8px);
      border: 1px solid #bfae9a;
      border-radius: 20px;
      padding: 18px 22px 20px;
      z-index: 20;
      transition: opacity 0.3s ease, transform 0.3s ease;
      box-shadow: 0 8px 40px rgba(44, 36, 27, 0.15);
    }
    .game-overlay.hidden {
      opacity: 0;
      transform: translateX(-50%) translateY(20px);
      pointer-events: none;
    }
    .game-overlay .question-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .game-overlay .question-row .year {
      font-family: 'Courier Prime', monospace;
      font-size: 30px;
      font-weight: 700;
      color: #a63a28;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
    }
    .game-overlay .question-row .year .label {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: #6a5e52;
    }
    .game-overlay .question-row .right-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .game-overlay .question-row .badge-group {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .game-overlay .question-row .badge-group .badge {
      font-size: 11px;
      padding: 2px 14px;
      border-radius: 30px;
      border: 1px solid #d4c5b0;
      color: #4a3c31;
      background: rgba(255, 255, 255, 0.4);
      font-weight: 500;
      text-transform: capitalize;
    }
    .game-overlay .question-row .badge-group .badge.cat {
      border-color: #8a7a6a;
      color: #3a2c21;
    }
    .game-overlay .question-row .badge-group .badge.diff {
      border-color: #bfae9a;
      color: #5a4e42;
    }
    /* ─── quit button ─── */
    .game-overlay .question-row .quit-btn {
      background: transparent;
      border: 1px solid #bfae9a;
      color: #6a5e52;
      padding: 2px 12px;
      border-radius: 30px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .game-overlay .question-row .quit-btn:hover {
      background: #f4efe1;
      border-color: #a09080;
      color: #3a2c21;
    }

    .game-overlay .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .game-overlay .options button {
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid #d4c5b0;
      background: rgba(255, 255, 255, 0.4);
      color: #2c241b;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s;
      text-align: left;
      touch-action: manipulation;
      font-weight: 500;
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
      line-height: 1.3;
      font-family: 'Inter', sans-serif;
    }
    .game-overlay .options button:hover:not(:disabled) {
      background: #f4efe1;
      border-color: #bfae9a;
    }
    .game-overlay .options button:disabled {
      cursor: default;
      opacity: 0.75;
    }
    .game-overlay .options button .letter {
      font-weight: 600;
      color: #6a5e52;
      min-width: 22px;
      font-size: 13px;
      font-family: 'Courier Prime', monospace;
    }
    .game-overlay .options button.correct {
      border-color: #2c7a4a;
      background: rgba(44, 122, 74, 0.12);
      color: #1a4a2a;
    }
    .game-overlay .options button.correct .letter {
      color: #2c7a4a;
    }
    .game-overlay .options button.wrong {
      border-color: #a63a28;
      background: rgba(166, 58, 40, 0.08);
      color: #7a2a1a;
    }
    .game-overlay .options button.wrong .letter {
      color: #a63a28;
    }
    .game-overlay .options button.reveal {
      border-color: #e8ddd0;
      background: rgba(255, 255, 255, 0.2);
      color: #6a5e52;
    }

    /* ─── feedback ─── */
    .feedback {
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      display: none;
      font-size: 14px;
      line-height: 1.5;
      border: 1px solid transparent;
      font-family: 'Inter', sans-serif;
    }
    .feedback.show {
      display: block;
    }
    .feedback.correct {
      border-color: #2c7a4a;
      background: rgba(44, 122, 74, 0.06);
      color: #1a3a2a;
    }
    .feedback.wrong {
      border-color: #a63a28;
      background: rgba(166, 58, 40, 0.06);
      color: #5a2a1a;
    }
    .feedback .fb-title {
      font-weight: 600;
      font-size: 16px;
      font-family: 'Playfair Display', serif;
    }
    .feedback .fb-desc {
      color: #3a2c21;
      font-size: 14px;
      margin-top: 2px;
    }
    .feedback .fb-fact {
      color: #6a5e52;
      font-size: 13px;
      margin-top: 4px;
      font-style: italic;
    }
    .feedback .fb-next {
      margin-top: 10px;
      padding: 6px 24px;
      border-radius: 40px;
      border: 1px solid #bfae9a;
      background: transparent;
      color: #2c241b;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: 0.2s;
      touch-action: manipulation;
      font-family: 'Inter', sans-serif;
    }
    .feedback .fb-next:hover {
      background: #f4efe1;
      border-color: #a09080;
    }

    /* ─── responsive ─── */
    @media (max-width: 700px) {
      body {
        padding: 8px;
      }
      .app {
        border-radius: 16px;
        max-height: none;
        height: 100vh;
      }
      .topbar {
        padding: 10px 14px;
      }
      .topbar .brand {
        font-size: 16px;
      }
      .topbar .brand small {
        display: none;
      }
      .topbar-stats {
        font-size: 12px;
        gap: 12px;
      }
      .setup-box {
        padding: 24px 18px;
        margin: 10px;
      }
      .setup-box h2 {
        font-size: 22px;
      }
      .game-overlay {
        bottom: 10px;
        padding: 14px 14px 16px;
        width: 96%;
      }
      .game-overlay .question-row .year {
        font-size: 22px;
      }
      .game-overlay .options {
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .game-overlay .options button {
        font-size: 13px;
        padding: 8px 10px;
        min-height: 38px;
      }
      .feedback {
        font-size: 13px;
        padding: 10px 12px;
      }
      .pin-marker {
        font-size: 28px;
      }
      .game-overlay .question-row .quit-btn {
        font-size: 11px;
        padding: 2px 10px;
      }
    }
    @media (max-width: 420px) {
      .game-overlay .options {
        grid-template-columns: 1fr 1fr;
        gap: 4px;
      }
      .game-overlay .options button {
        font-size: 12px;
        padding: 6px 8px;
        min-height: 34px;
        gap: 4px;
      }
      .game-overlay .question-row .year {
        font-size: 18px;
      }
      .topbar-stats .stat .label {
        display: none;
      }
      .topbar .brand {
        font-size: 14px;
      }
    }

    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-thumb {
      background: #bfae9a;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
  </style>
</head>
<body>

<div class="app" id="app">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="brand">
      <span class="logo">📜</span>
      History Guesser
      <small>· where & when?</small>
    </div>
    <div class="topbar-stats">
      <span class="stat">🏆 <span class="num" id="scoreDisplay">0</span></span>
      <span class="stat">🔥 <span class="num gold" id="streakDisplay">0</span></span>
      <span class="stat">📌 <span class="num" id="roundDisplay">0</span></span>
    </div>
  </header>

  <!-- MAIN -->
  <div class="main">
    <div class="map-wrap" id="mapWrap">
      <canvas id="mapCanvas"></canvas>
      <div class="pin-marker" id="pinMarker">📍</div>

      <!-- SETUP OVERLAY -->
      <div class="setup-overlay" id="setupOverlay">
        <div class="setup-box">
          <h2>🗺️ History Guesser</h2>
          <div class="sub">A pin drops. A date appears. You guess the event.</div>

          <div class="field">
            <label>🎯 Category</label>
            <div class="options" id="categoryOptions"></div>
          </div>

          <div class="field">
            <label>📊 Difficulty</label>
            <div class="options" id="difficultyOptions"></div>
          </div>

          <button class="start-btn" id="startBtn">⚡ Start Guessing</button>
          <div class="event-count" id="eventCountDisplay">Loading events…</div>
        </div>
      </div>

      <!-- GAME OVERLAY -->
      <div class="game-overlay hidden" id="gameOverlay">
        <div class="question-row">
          <span class="year" id="yearDisplay"><span class="label">📅</span> —</span>
          <div class="right-group">
            <span class="badge-group">
              <span class="badge cat" id="catBadge">—</span>
              <span class="badge diff" id="diffBadge">—</span>
            </span>
            <button class="quit-btn" id="btnQuit">✕ Quit</button>
          </div>
        </div>
        <div class="options" id="optionsContainer">
          <button data-index="0"><span class="letter">A.</span> <span class="text">—</span></button>
          <button data-index="1"><span class="letter">B.</span> <span class="text">—</span></button>
          <button data-index="2"><span class="letter">C.</span> <span class="text">—</span></button>
          <button data-index="3"><span class="letter">D.</span> <span class="text">—</span></button>
        </div>
        <div class="feedback" id="feedback">
          <div class="fb-title" id="fbTitle">✅ Correct!</div>
          <div class="fb-desc" id="fbDesc">Event description</div>
          <div class="fb-fact" id="fbFact">💡 Fun fact</div>
          <button class="fb-next" id="fbNext">→ Next Event</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  script.js  —  History Guesser  —  with quit function
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  // ─── DOM refs ──────────────────────────────────────────────────────────
  const canvas = document.getElementById('mapCanvas');
  const ctx = canvas.getContext('2d');
  const mapWrap = document.getElementById('mapWrap');
  const pinMarker = document.getElementById('pinMarker');
  const setupOverlay = document.getElementById('setupOverlay');
  const gameOverlay = document.getElementById('gameOverlay');
  const yearDisplay = document.getElementById('yearDisplay');
  const catBadge = document.getElementById('catBadge');
  const diffBadge = document.getElementById('diffBadge');
  const optionsContainer = document.getElementById('optionsContainer');
  const feedback = document.getElementById('feedback');
  const fbTitle = document.getElementById('fbTitle');
  const fbDesc = document.getElementById('fbDesc');
  const fbFact = document.getElementById('fbFact');
  const fbNext = document.getElementById('fbNext');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const streakDisplay = document.getElementById('streakDisplay');
  const roundDisplay = document.getElementById('roundDisplay');
  const startBtn = document.getElementById('startBtn');
  const categoryOptions = document.getElementById('categoryOptions');
  const difficultyOptions = document.getElementById('difficultyOptions');
  const eventCountDisplay = document.getElementById('eventCountDisplay');
  const btnQuit = document.getElementById('btnQuit');

  // ─── state ──────────────────────────────────────────────────────────────
  let W = 0,
    H = 0;
  let dpr = 1;
  let score = 0;
  let streak = 0;
  let round = 0;
  let totalEvents = 0;
  let selectedCategory = 'All';
  let selectedDifficulty = 'All';
  let currentEvent = null;
  let currentOptions = [];
  let isAnswered = false;
  let gameActive = false;

  // ─── map image ──────────────────────────────────────────────────────────
  let mapImage = null;
  let mapLoaded = false;

  // ─── EVENT DATABASE (70+ events) ──────────────────────────────────────
  const EVENTS = [{
    id: 1,

  }, {

    category: 'Exploration',
    difficulty: 'Easy',
    description: 'Christopher Columbus reached the islands of the Caribbean.',
    funFact: 'Columbus never set foot on the mainland of North America.'
  }, {
    id: 5,
    name: 'Mona Lisa Painted',

    category: 'Culture',
    difficulty: 'Medium',

  // ─── helpers ──────────────────────────────────────────────────────────
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  // ─── map rendering ────────────────────────────────────────────────────

  function drawMap() {
    const cw = canvas.width / dpr;
    const ch = canvas.height / dpr;
    ctx.clearRect(0, 0, cw, ch);

    // ── parchment background ──
    const grad = ctx.createRadialGradient(cw / 2, ch / 2, 0, cw / 2, ch / 2, cw * 0.75);
    grad.addColorStop(0, '#fdf8f0');
    grad.addColorStop(0.7, '#f5efe4');
    grad.addColorStop(1, '#e8ddd0');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, cw, ch);

    // ── draw the map image ──
    if (mapLoaded && mapImage) {
      ctx.drawImage(mapImage, 0, 0, cw, ch);
    } else {
      // fallback: show a message
      ctx.fillStyle = '#3a2c21';
      ctx.font = '18px "Playfair Display", serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🌍 Loading map...', cw / 2, ch / 2);
    }

    // ── compass rose ──
    const cx = 60,
      cy = ch - 60,
      cr = 28;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.strokeStyle = 'rgba(106, 94, 82, 0.5)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(0, 0, cr, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-cr, 0);
    ctx.lineTo(cr, 0);
    ctx.moveTo(0, -cr);
    ctx.lineTo(0, cr);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-cr * 0.7, -cr * 0.7);
    ctx.lineTo(cr * 0.7, cr * 0.7);
    ctx.moveTo(cr * 0.7, -cr * 0.7);
    ctx.lineTo(-cr * 0.7, cr * 0.7);
    ctx.stroke();
    ctx.fillStyle = 'rgba(58, 44, 33, 0.6)';
    ctx.font = 'bold 14px "Playfair Display", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('N', 0, -cr - 14);
    ctx.restore();

    // ── title ──
    ctx.fillStyle = 'rgba(58, 44, 33, 0.12)';
    ctx.font = 'italic 20px "Playfair Display", serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText('~ Historia Mundi ~', 24, 16);
  }

  // ─── load map image ──────────────────────────────────────────────────
  function loadMapImage() {
    const img = new Image();
    // Use the local file you downloaded as img.jpg
    img.src = 'img.png';
    img.onload = function() {
      mapImage = img;
      mapLoaded = true;
      if (W && H) drawMap();
    };
    img.onerror = function() {
      console.warn('Could not load img.jpg. Make sure the file is in the same folder as this HTML.');
      // Try the online URL as a fallback
      const fallbackImg = new Image();
      fallbackImg.crossOrigin = 'anonymous';
      fallbackImg.src = 'https://fun-play.co.uk/wp-content/uploads/Playground-Marking-World-Map-With-Oceans-with-background.png';
      fallbackImg.onload = function() {
        mapImage = fallbackImg;
        mapLoaded = true;
        if (W && H) drawMap();
      };
      fallbackImg.onerror = function() {
        console.warn('Fallback image also failed. Using placeholder.');
        mapLoaded = false;
        drawMap();
      };
    };
  }

  // ─── resize ──────────────────────────────────────────────────────────
  function resizeMap() {
    const rect = mapWrap.getBoundingClientRect();
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = rect.width;
    H = rect.height;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);
    drawMap();
  }

  // ─── game logic ──────────────────────────────────────────────────────

  function getFilteredEvents() {
    let filtered = EVENTS.slice();
    if (selectedCategory !== 'All') {
      filtered = filtered.filter(e => e.category === selectedCategory);
    }
    if (selectedDifficulty !== 'All') {
      filtered = filtered.filter(e => e.difficulty === selectedDifficulty);
    }
    return filtered;
  }

  function getCategories() {
    const cats = new Set(EVENTS.map(e => e.category));
    return ['All', ...Array.from(cats).sort()];
  }

  function getDifficulties() {
    const diffs = new Set(EVENTS.map(e => e.difficulty));
    return ['All', ...Array.from(diffs).sort()];
  }

  function generateOptions(correctEvent, pool) {
    const wrongs = pool.filter(e => e.id !== correctEvent.id);
    shuffle(wrongs);
    const selected = wrongs.slice(0, 3);
    while (selected.length < 3) {
      const fallback = EVENTS.filter(e => e.id !== correctEvent.id && !selected.includes(e));
      if (fallback.length === 0) break;
      selected.push(pick(fallback));
    }
    const options = [correctEvent, ...selected];
    shuffle(options);
    return options;
  }

  // ─── quit game ──────────────────────────────────────────────────────
  function quitGame() {
    if (!gameActive) return;
    if (confirm('Quit the game and go back to setup?')) {
      gameActive = false;
      isAnswered = false;
      setupOverlay.classList.remove('hidden');
      gameOverlay.classList.add('hidden');
      feedback.classList.remove('show', 'correct', 'wrong');
      pinMarker.style.display = 'none';
      // Reset answer buttons
      optionsContainer.querySelectorAll('button').forEach(b => b.disabled = false);
      // Reset feedback next button
      fbNext.style.display = 'none';
    }
  }

  function startGame() {
    const filtered = getFilteredEvents();
    if (filtered.length < 2) {
      alert('Not enough events! Try a broader category or difficulty.');
      return;
    }
    totalEvents = filtered.length;
    eventCountDisplay.textContent = `📌 ${filtered.length} events available`;
    setupOverlay.classList.add('hidden');
    gameOverlay.classList.remove('hidden');
    gameActive = true;
    round = 0;
    score = 0;
    streak = 0;
    pinMarker.style.display = 'block';
    updateStats();
    nextRound();
  }

  function nextRound() {
    if (!gameActive) return;
    const filtered = getFilteredEvents();
    if (filtered.length < 2) {
      alert('Not enough events! Please restart with broader filters.');
      return;
    }
    round++;
    isAnswered = false;
    feedback.classList.remove('show', 'correct', 'wrong');

    currentEvent = pick(filtered);
    currentOptions = generateOptions(currentEvent, filtered);

    yearDisplay.innerHTML = `<span class="label">📅</span> ${currentEvent.year}`;
    catBadge.textContent = currentEvent.category;
    diffBadge.textContent = currentEvent.difficulty;

    const buttons = optionsContainer.querySelectorAll('button');
    const labels = ['A', 'B', 'C', 'D'];
    buttons.forEach((btn, idx) => {
      const opt = currentOptions[idx];
      btn.querySelector('.text').textContent = opt.name;
      btn.dataset.id = opt.id;
      btn.disabled = false;
      btn.className = '';
      btn.querySelector('.letter').textContent = labels[idx] + '.';
    });

    placePin(currentEvent.x, currentEvent.y);
    fbNext.style.display = 'none';
    updateStats();
    drawMap();
  }

  function placePin(x, y) {
    const px = x * W;
    const py = y * H;
    pinMarker.style.left = px + 'px';
    pinMarker.style.top = py + 'px';
    pinMarker.classList.remove('bounce');
    void pinMarker.offsetWidth;
    pinMarker.classList.add('bounce');
  }

  function handleAnswer(index) {
    if (isAnswered || !gameActive) return;
    const buttons = optionsContainer.querySelectorAll('button');
    const selectedBtn = buttons[index];
    const selectedId = parseInt(selectedBtn.dataset.id);
    const isCorrect = selectedId === currentEvent.id;
    isAnswered = true;

    buttons.forEach(b => b.disabled = true);

    buttons.forEach((btn) => {
      const id = parseInt(btn.dataset.id);
      if (id === currentEvent.id) {
        btn.classList.add('correct');
      } else if (id === selectedId && !isCorrect) {
        btn.classList.add('wrong');
      } else {
        btn.classList.add('reveal');
      }
    });

    if (isCorrect) {
      score++;
      streak++;
      feedback.className = 'feedback show correct';
      fbTitle.textContent = '✅ Correct!';
    } else {
      streak = 0;
      feedback.className = 'feedback show wrong';
      fbTitle.textContent = '❌ Not quite.';
    }
    fbDesc.textContent = currentEvent.description;
    fbFact.textContent = '💡 ' + currentEvent.funFact;
    fbNext.style.display = 'inline-block';
    updateStats();
  }

  function updateStats() {
    scoreDisplay.textContent = score;
    streakDisplay.textContent = streak;
    roundDisplay.textContent = round;
  }

  // ─── setup UI ──────────────────────────────────────────────────────

  function buildSetupUI() {
    const cats = getCategories();
    categoryOptions.innerHTML = '';
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.textContent = cat;
      btn.dataset.value = cat;
      if (cat === 'All') btn.classList.add('active');
      btn.addEventListener('click', () => {
        categoryOptions.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedCategory = cat;
        updateEventCount();
      });
      categoryOptions.appendChild(btn);
    });

    const diffs = getDifficulties();
    difficultyOptions.innerHTML = '';
    diffs.forEach(diff => {
      const btn = document.createElement('button');
      btn.textContent = diff;
      btn.dataset.value = diff;
      if (diff === 'All') btn.classList.add('active');
      btn.addEventListener('click', () => {
        difficultyOptions.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedDifficulty = diff;
        updateEventCount();
      });
      difficultyOptions.appendChild(btn);
    });
    updateEventCount();
  }

  function updateEventCount() {
    const filtered = getFilteredEvents();
    eventCountDisplay.textContent = `📌 ${filtered.length} events available`;
  }

  // ─── init ──────────────────────────────────────────────────────────

  function init() {
    loadMapImage();
    resizeMap();
    buildSetupUI();

    optionsContainer.querySelectorAll('button').forEach((btn, idx) => {
      btn.addEventListener('click', () => handleAnswer(idx));
      btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        handleAnswer(idx);
      });
    });

    fbNext.addEventListener('click', nextRound);
    fbNext.addEventListener('touchend', (e) => {
      e.preventDefault();
      nextRound();
    });

    startBtn.addEventListener('click', startGame);
    startBtn.addEventListener('touchend', (e) => {
      e.preventDefault();
      startGame();
    });

    // ── quit button ──
    btnQuit.addEventListener('click', quitGame);
    btnQuit.addEventListener('touchend', (e) => {
      e.preventDefault();
      quitGame();
    });

    const ro = new ResizeObserver(() => {
      resizeMap();
      if (currentEvent) placePin(currentEvent.x, currentEvent.y);
    });
    ro.observe(mapWrap);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        quitGame();
        return;
      }
      if (!gameActive || isAnswered) return;
      if (e.key === '1' || e.key === 'a' || e.key === 'A') handleAnswer(0);
      if (e.key === '2' || e.key === 'b' || e.key === 'B') handleAnswer(1);
      if (e.key === '3' || e.key === 'c' || e.key === 'C') handleAnswer(2);
      if (e.key === '4' || e.key === 'd' || e.key === 'D') handleAnswer(3);
      if (e.key === 'Enter' && feedback.classList.contains('show')) {
        nextRound();
      }
    });

    console.log('📜 History Guesser loaded with your local map image (img.jpg).');
    console.log(`📌 ${EVENTS.length} events loaded.`);
    console.log('⌨️  1-4 or A-D to answer · Enter for next · Escape to quit');
  }

  document.addEventListener('DOMContentLoaded', init);
  window.addEventListener('resize', () => { resizeMap(); });

  window.__history = { EVENTS, getFilteredEvents, currentEvent };
</script>
</body>
